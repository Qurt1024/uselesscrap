<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Status Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #1a202c;
      --muted: #718096;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
      color: var(--text);
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .card h2 {
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 4px;
      color: var(--text);
    }

    #myInfo {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* Status buttons */
    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .status-btn {
      padding: 14px 10px;
      border: none;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s ease, filter 0.1s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #fff;
    }

    .status-btn:hover { filter: brightness(1.1); }
    .status-btn:active { transform: scale(0.97); }

    .btn-studying  { background: #38a169; }
    .btn-coffee    { background: #d69e2e; }
    .btn-gaming    { background: #319795; }
    .btn-home      { background: #718096; }

    /* Group monitor */
    #groupList {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #edf2f7;
    }

    .user-item:last-child { border-bottom: none; }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .user-info strong {
      display: block;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .user-info small {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .refresh-note {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- My Profile Card -->
    <div class="card">
      <h2>My Profile</h2>
      <p id="myInfo">Loading...</p>

      <div class="status-grid">
        <button class="status-btn btn-studying" onclick="changeStatus('Studying 📚', '#38a169')">
          📚 Studying
        </button>
        <button class="status-btn btn-coffee" onclick="changeStatus('Coffee break ☕', '#d69e2e')">
          ☕ Coffee
        </button>
        <button class="status-btn btn-gaming" onclick="changeStatus('Gaming 🎮', '#319795')">
          🎮 Gaming
        </button>
        <button class="status-btn btn-home" onclick="changeStatus('At home 🏠', '#718096')">
          🏠 Home
        </button>
      </div>
    </div>

    <!-- Group Monitor Card -->
    <div class="card">
      <h2>Group Monitor</h2>
      <div id="groupList">
        <p style="color: var(--muted); font-size:0.9rem;">Loading members...</p>
      </div>
      <p class="refresh-note">⟳ Auto-refreshes every 5 seconds</p>
    </div>

  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // ─── 🔧 YOUR SUPABASE CREDENTIALS ────────────────────────────────────────
    const URL  = 'https://jjbwannzgqczraubzfia.supabase.co';        // ← replace
    const KEY  = 'sb_publishable_mSgF7ME8qGh6MJsiI_A1gw_FVl6i9rG';                        // ← replace
    const MY_ID = 'dfcb0d65-bf05-4d6f-a9d4-8f5aff215ced';                             // ← replace (your row's id in profiles)
    // ─────────────────────────────────────────────────────────────────────────

    // Status color map (used if your table has no 'color' column)
    const STATUS_COLORS = {
      'Studying 📚':      '#38a169',
      'Coffee break ☕':  '#d69e2e',
      'Gaming 🎮':        '#319795',
      'At home 🏠':       '#718096',
    };

    const supabase = createClient(URL, KEY);

    // Update your status row in Supabase
    window.changeStatus = async (text, color) => {
      const { error } = await supabase
        .from('profiles')
        .update({ status: text })           // add ", color: color" if you have a color column
        .eq('id', MY_ID);

      if (error) {
        alert('Error: check your RLS policies in Supabase.');
        console.error(error);
      } else {
        fetchGroup();
      }
    };

    // Fetch all profiles and render the list
    async function fetchGroup() {
      const { data, error } = await supabase
        .from('profiles')
        .select('*')
        .order('username', { ascending: true });

      if (error) return console.error(error);

      const list = document.getElementById('groupList');
      list.innerHTML = data.map(user => {
        const dotColor = STATUS_COLORS[user.status] || '#cbd5e0';
        return `
          <div class="user-item">
            <div class="status-dot" style="background:${dotColor}"></div>
            <div class="user-info">
              <strong>${user.username}</strong>
              <small>${user.status || 'No status set'}</small>
            </div>
          </div>
        `;
      }).join('');

      const me = data.find(u => u.id === MY_ID);
      if (me) {
        document.getElementById('myInfo').textContent = `Logged in as: ${me.username}`;
      }
    }

    fetchGroup();
    setInterval(fetchGroup, 5000);
  </script>
</body>
</html>
